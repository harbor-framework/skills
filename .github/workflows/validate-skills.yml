name: Validate Skills

on:
  push:
    branches: [main]
    paths:
      - 'skills/**'
  pull_request:
    branches: [main]
    paths:
      - 'skills/**'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Validate harbor-task-creator
        run: python scripts/quick_validate.py ./skills/harbor-task-creator

      - name: Validate harbor-adapter-creator
        run: python scripts/quick_validate.py ./skills/harbor-adapter-creator

      - name: Validate harbor-cli
        run: python scripts/quick_validate.py ./skills/harbor-cli
